<div class="tech-grid"></div>

<div class="app-container">
  <nav class="top-nav glass-panel animate-fade-in" style="animation-delay: 0.1s;">
    <a routerLink="/" class="logo"
      style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 0.5rem;">
      <img src="logoMin.png" alt="Logo Payload" style="height: 32px; width: auto; object-fit: contain;">
      <span class="logo-text">PAYLOAD <span class="highlight">STRATEGIC STRIKE</span></span>
    </a>

    <div class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">Inicio</a>
      <a routerLink="/lobby" routerLinkActive="active" class="nav-item">Lobby (Todos vs Todos)</a>
      <a routerLink="/ranking" routerLinkActive="active" class="nav-item">Clasificación</a>
    </div>

    <div class="user-profile" style="cursor: pointer;" routerLink="/login">
      <div class="level-badge">#</div>
      <div class="avatar-placeholder"></div>
      <span class="username">Iniciar Sesión</span>
    </div>
  </nav>

  <div class="router-wrapper">
    <router-outlet></router-outlet>
  </div>

  <footer class="app-footer animate-fade-in" style="animation-delay: 0.4s;">
    <div class="footer-links">
      <a href="#">Términos y Condiciones</a>
      <a href="#">Política de Privacidad</a>
      <a href="#">Reglas de Combate</a>
      <a href="#">Soporte Táctico</a>
    </div>
    <div class="footer-divider"></div>
    <p class="footer-copy">&copy; 2026 Payload Strategic Strike. Proyecto DAM.</p>
  </footer>
</div>
